<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cabo de Guerra: Cálculo Mental</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

<!-- ══════════════════════════════════════
     TELA DE CONFIGURAÇÃO
══════════════════════════════════════ -->
<div id="screen-config" class="screen active">
  <div class="config-card">
    <div class="config-logo">🧮</div>
    <h1 class="config-title">Cabo de Guerra<br><span>Cálculo Mental</span></h1>

    <div class="config-body">

      <!-- Identificação -->
      <div class="cfg-section">
        <h3 class="cfg-label">🏫 Equipes</h3>
        <div class="team-name-row">
          <div class="team-input-group team-a-group">
            <input id="team-a-name" type="text" value="Equipe A" maxlength="14" autocomplete="off">
          </div>
          <span class="vs-badge">VS</span>
          <div class="team-input-group team-b-group">
            <input id="team-b-name" type="text" value="Equipe B" maxlength="14" autocomplete="off">
          </div>
        </div>
      </div>

      <!-- Turma -->
      <div class="cfg-section">
        <h3 class="cfg-label">📚 Turma</h3>
        <div class="btn-group" id="sel-class">
          <button class="sel-btn" data-v="2">2º Ano</button>
          <button class="sel-btn" data-v="3">3º Ano</button>
          <button class="sel-btn" data-v="4">4º Ano</button>
          <button class="sel-btn" data-v="5">5º Ano</button>
        </div>
      </div>

      <!-- Operação -->
      <div class="cfg-section">
        <h3 class="cfg-label">➕ Operação</h3>
        <div class="btn-group" id="sel-op">
          <button class="sel-btn op-btn" data-v="+"><span>+</span></button>
          <button class="sel-btn op-btn" data-v="-"><span>−</span></button>
          <button class="sel-btn op-btn" data-v="*"><span>×</span></button>
          <button class="sel-btn op-btn" data-v="/"><span>÷</span></button>
        </div>
      </div>

      <!-- Dificuldade -->
      <div class="cfg-section">
        <h3 class="cfg-label">🎯 Dificuldade</h3>
        <select id="sel-diff" class="cfg-select">
          <option value="units">Unidades (1 a 9)</option>
          <option value="tens">Dezenas (10 a 99)</option>
          <option value="hundreds">Centenas (100 a 999)</option>
          <option value="thousands">Milhares (1.000 a 9.999)</option>
        </select>
      </div>

      <!-- Rodadas & Tempo -->
      <div class="cfg-two-col">
        <div class="cfg-section">
          <h3 class="cfg-label">🔁 Rodadas</h3>
          <div class="btn-group" id="sel-rounds">
            <button class="sel-btn" data-v="5">5</button>
            <button class="sel-btn" data-v="7">7</button>
            <button class="sel-btn" data-v="10">10</button>
            <button class="sel-btn" data-v="15">15</button>
          </div>
        </div>
        <div class="cfg-section">
          <h3 class="cfg-label">⏱ Tempo/rodada</h3>
          <div class="btn-group" id="sel-time">
            <button class="sel-btn" data-v="0">∞</button>
            <button class="sel-btn" data-v="10">10s</button>
            <button class="sel-btn" data-v="15">15s</button>
            <button class="sel-btn" data-v="20">20s</button>
          </div>
        </div>
      </div>

      <!-- Regras -->
      <div class="cfg-section">
        <h3 class="cfg-label">⚙️ Regras</h3>
        <div class="cfg-checks">
          <label><input type="checkbox" id="chk-noneg" checked> Bloquear resultados negativos</label>
          <label><input type="checkbox" id="chk-exact" checked> Divisão apenas exata</label>
        </div>
      </div>

    </div><!-- /.config-body -->

    <button id="btn-start" class="btn-start">
      ▶ Iniciar Jogo
    </button>
    <a href="../" class="btn-hub-link">← Voltar ao Hub</a>
  </div>
</div>

<!-- ══════════════════════════════════════
     TELA DO JOGO
══════════════════════════════════════ -->
<div id="screen-game" class="screen">

  <!-- Painel Equipe A -->
  <div id="panel-a" class="panel panel-a">
    <div class="panel-header ph-a">
      <span class="ph-name" id="ph-name-a">Equipe A</span>
      <span class="ph-score" id="ph-score-a">0</span>
    </div>
    <div class="question-box" id="qbox-a">
      <div class="question-text" id="q-a">? + ? = ?</div>
    </div>
    <div class="answer-display" id="ans-a">0</div>
    <div class="keypad" id="kp-a">
      <button class="key" data-k="1">1</button>
      <button class="key" data-k="2">2</button>
      <button class="key" data-k="3">3</button>
      <button class="key" data-k="4">4</button>
      <button class="key" data-k="5">5</button>
      <button class="key" data-k="6">6</button>
      <button class="key" data-k="7">7</button>
      <button class="key" data-k="8">8</button>
      <button class="key" data-k="9">9</button>
      <button class="key key-del" data-k="del">⌫</button>
      <button class="key" data-k="0">0</button>
      <button class="key key-ok" data-k="ok">✔</button>
    </div>
    <div class="panel-feedback" id="fb-a"></div>
  </div>

  <!-- Arena Central -->
  <div class="arena" id="arena">

    <!-- Header da arena -->
    <div class="arena-hdr">
      <div class="arena-score-a" id="arena-score-a">0</div>
      <div class="arena-center-info">
        <div class="arena-timer" id="arena-timer">–</div>
        <div class="arena-round" id="arena-round">Rodada 1/10</div>
      </div>
      <div class="arena-score-b" id="arena-score-b">0</div>
    </div>

    <!-- SVG Cabo de Guerra -->
    <div class="tug-wrapper">
      <svg id="tug-svg" viewBox="0 0 520 190" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">

        <!-- Zonas de vitória -->
        <rect x="0" y="0" width="170" height="190" fill="#BBDEFB" opacity="0.35" rx="0"/>
        <rect x="350" y="0" width="170" height="190" fill="#FFCDD2" opacity="0.35" rx="0"/>

        <!-- Linha central tracejada -->
        <line x1="260" y1="5" x2="260" y2="185" stroke="#aaa" stroke-dasharray="7,5" stroke-width="2"/>

        <!-- Marcadores de zona -->
        <line x1="170" y1="0" x2="170" y2="190" stroke="#1565C0" stroke-dasharray="4,4" stroke-width="1.5" opacity="0.5"/>
        <line x1="350" y1="0" x2="350" y2="190" stroke="#C62828" stroke-dasharray="4,4" stroke-width="1.5" opacity="0.5"/>

        <!-- CORDA -->
        <line id="rope" x1="148" y1="100" x2="372" y2="100" stroke="#8B6914" stroke-width="6" stroke-linecap="round"/>

        <!-- BANDEIRA na corda -->
        <g id="rope-flag" style="transform: translateX(0px); transition: transform 0.55s cubic-bezier(0.34,1.56,0.64,1);">
          <rect x="252" y="78" width="16" height="22" rx="3" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
          <line x1="252" y1="78" x2="252" y2="110" stroke="#555" stroke-width="3" stroke-linecap="round"/>
          <circle cx="252" cy="110" r="4" fill="#555"/>
        </g>

        <!-- ══ PERSONAGENS EQUIPE A (azul, esquerda) ══ -->
        <g id="chars-a">

          <!-- Personagem A1 (atrás) -->
          <g class="char-a">
            <circle cx="52" cy="38" r="18" fill="#1565C0" stroke="#0D47A1" stroke-width="2"/>
            <circle cx="59" cy="34" r="5" fill="white" opacity="0.9"/>
            <circle cx="61" cy="34" r="3" fill="#0D47A1"/>
            <path d="M36,30 Q44,20 65,26" stroke="#0D47A1" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M44,56 L36,100 L60,100 L58,56 Z" fill="#1565C0" stroke="#0D47A1" stroke-width="1.5" transform="rotate(10 50 78)"/>
            <path d="M55,68 Q80,76 108,88" stroke="#1565C0" stroke-width="9" fill="none" stroke-linecap="round"/>
            <circle cx="108" cy="90" r="7" fill="#1565C0"/>
            <line x1="46" y1="98" x2="28" y2="140" stroke="#0D47A1" stroke-width="10" stroke-linecap="round"/>
            <line x1="54" y1="100" x2="64" y2="140" stroke="#0D47A1" stroke-width="10" stroke-linecap="round"/>
            <ellipse cx="26" cy="143" rx="13" ry="6" fill="#0D47A1"/>
            <ellipse cx="66" cy="143" rx="13" ry="6" fill="#0D47A1"/>
          </g>

          <!-- Personagem A2 (frente) -->
          <g class="char-a">
            <circle cx="105" cy="38" r="18" fill="#1976D2" stroke="#0D47A1" stroke-width="2"/>
            <circle cx="112" cy="34" r="5" fill="white" opacity="0.9"/>
            <circle cx="114" cy="34" r="3" fill="#0D47A1"/>
            <path d="M89,30 Q97,20 118,26" stroke="#0D47A1" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M97,56 L89,100 L113,100 L111,56 Z" fill="#1976D2" stroke="#0D47A1" stroke-width="1.5" transform="rotate(10 103 78)"/>
            <path d="M108,68 Q128,76 148,88" stroke="#1976D2" stroke-width="9" fill="none" stroke-linecap="round"/>
            <circle cx="148" cy="90" r="7" fill="#1976D2"/>
            <line x1="99" y1="98" x2="81" y2="140" stroke="#0D47A1" stroke-width="10" stroke-linecap="round"/>
            <line x1="107" y1="100" x2="117" y2="140" stroke="#0D47A1" stroke-width="10" stroke-linecap="round"/>
            <ellipse cx="79" cy="143" rx="13" ry="6" fill="#0D47A1"/>
            <ellipse cx="119" cy="143" rx="13" ry="6" fill="#0D47A1"/>
          </g>
        </g>

        <!-- ══ PERSONAGENS EQUIPE B (vermelho, direita — espelho manual) ══ -->
        <g id="chars-b">

          <!-- Personagem B1 (frente, espelho de A2) -->
          <g class="char-b">
            <circle cx="415" cy="38" r="18" fill="#C62828" stroke="#B71C1C" stroke-width="2"/>
            <circle cx="408" cy="34" r="5" fill="white" opacity="0.9"/>
            <circle cx="406" cy="34" r="3" fill="#B71C1C"/>
            <path d="M431,30 Q423,20 402,26" stroke="#B71C1C" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M423,56 L431,100 L407,100 L409,56 Z" fill="#C62828" stroke="#B71C1C" stroke-width="1.5" transform="rotate(-10 417 78)"/>
            <path d="M412,68 Q392,76 372,88" stroke="#C62828" stroke-width="9" fill="none" stroke-linecap="round"/>
            <circle cx="372" cy="90" r="7" fill="#C62828"/>
            <line x1="421" y1="98" x2="439" y2="140" stroke="#B71C1C" stroke-width="10" stroke-linecap="round"/>
            <line x1="413" y1="100" x2="403" y2="140" stroke="#B71C1C" stroke-width="10" stroke-linecap="round"/>
            <ellipse cx="441" cy="143" rx="13" ry="6" fill="#B71C1C"/>
            <ellipse cx="401" cy="143" rx="13" ry="6" fill="#B71C1C"/>
          </g>

          <!-- Personagem B2 (atrás, espelho de A1) -->
          <g class="char-b">
            <circle cx="468" cy="38" r="18" fill="#E53935" stroke="#B71C1C" stroke-width="2"/>
            <circle cx="461" cy="34" r="5" fill="white" opacity="0.9"/>
            <circle cx="459" cy="34" r="3" fill="#B71C1C"/>
            <path d="M484,30 Q476,20 455,26" stroke="#B71C1C" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M476,56 L484,100 L460,100 L462,56 Z" fill="#E53935" stroke="#B71C1C" stroke-width="1.5" transform="rotate(-10 470 78)"/>
            <path d="M465,68 Q445,76 412,88" stroke="#E53935" stroke-width="9" fill="none" stroke-linecap="round"/>
            <circle cx="412" cy="90" r="7" fill="#E53935"/>
            <line x1="474" y1="98" x2="492" y2="140" stroke="#B71C1C" stroke-width="10" stroke-linecap="round"/>
            <line x1="466" y1="100" x2="456" y2="140" stroke="#B71C1C" stroke-width="10" stroke-linecap="round"/>
            <ellipse cx="494" cy="143" rx="13" ry="6" fill="#B71C1C"/>
            <ellipse cx="454" cy="143" rx="13" ry="6" fill="#B71C1C"/>
          </g>
        </g>

        <!-- Rótulos das zonas -->
        <text x="85" y="183" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="bold" opacity="0.7">← Zona A</text>
        <text x="435" y="183" text-anchor="middle" font-size="11" fill="#C62828" font-weight="bold" opacity="0.7">Zona B →</text>

      </svg>
    </div><!-- /.tug-wrapper -->

    <!-- Barra de posição da corda -->
    <div class="rope-bar-wrap">
      <div class="rope-bar-track">
        <div class="rope-bar-zone-a"></div>
        <div class="rope-bar-zone-b"></div>
        <div class="rope-bar-marker" id="bar-marker"></div>
      </div>
    </div>

  </div><!-- /.arena -->

  <!-- Painel Equipe B -->
  <div id="panel-b" class="panel panel-b">
    <div class="panel-header ph-b">
      <span class="ph-score" id="ph-score-b">0</span>
      <span class="ph-name" id="ph-name-b">Equipe B</span>
    </div>
    <div class="question-box" id="qbox-b">
      <div class="question-text" id="q-b">? + ? = ?</div>
    </div>
    <div class="answer-display" id="ans-b">0</div>
    <div class="keypad" id="kp-b">
      <button class="key" data-k="1">1</button>
      <button class="key" data-k="2">2</button>
      <button class="key" data-k="3">3</button>
      <button class="key" data-k="4">4</button>
      <button class="key" data-k="5">5</button>
      <button class="key" data-k="6">6</button>
      <button class="key" data-k="7">7</button>
      <button class="key" data-k="8">8</button>
      <button class="key" data-k="9">9</button>
      <button class="key key-del" data-k="del">⌫</button>
      <button class="key" data-k="0">0</button>
      <button class="key key-ok" data-k="ok">✔</button>
    </div>
    <div class="panel-feedback" id="fb-b"></div>
  </div>

</div><!-- /#screen-game -->

<!-- ══════════════════════════════════════
     TELA DE RESULTADO
══════════════════════════════════════ -->
<div id="screen-result" class="screen">
  <div class="result-card">
    <div id="result-emoji" class="result-emoji">🏆</div>
    <h2 id="result-title" class="result-title">Fim de Jogo!</h2>
    <div id="result-subtitle" class="result-subtitle"></div>

    <div class="result-scores">
      <div class="rs-card rs-a">
        <div class="rs-name" id="rs-name-a">Equipe A</div>
        <div class="rs-num" id="rs-score-a">0</div>
        <div class="rs-label">acertos</div>
      </div>
      <div class="rs-vs">VS</div>
      <div class="rs-card rs-b">
        <div class="rs-name" id="rs-name-b">Equipe B</div>
        <div class="rs-num" id="rs-score-b">0</div>
        <div class="rs-label">acertos</div>
      </div>
    </div>

    <div class="result-actions">
      <button id="btn-again" class="btn-again">🔄 Jogar Novamente</button>
      <button id="btn-config" class="btn-config">⚙️ Configurar</button>
      <a href="../" class="btn-hub">🏠 Hub</a>
    </div>
  </div>

  <!-- Confetti (CSS particles) -->
  <div id="confetti-wrap" class="confetti-wrap" aria-hidden="true"></div>
</div>

<script src="script.js?v=5"></script>
<script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
</script>
</body>
</html>
